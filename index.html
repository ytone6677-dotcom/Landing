<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Smartphones | Verified Deliveries</title>
    
    <!-- Futuristic AI Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Modern Robotic / Cyberpunk Theme CSS */
        :root {
            --bg-base: #030305;
            --surface: rgba(15, 15, 20, 0.7);
            --border-tech: rgba(59, 130, 246, 0.4);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --neon-primary: #8b5cf6;
            --neon-secondary: #06b6d4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            /* Cyberpunk Grid Background */
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
        }

        /* --- Navigation Bar --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(3, 3, 5, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-tech);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 40px;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .navbar::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-secondary), transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .nav-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        /* Typography */
        h2 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }

        .gradient-text {
            background: linear-gradient(135deg, var(--neon-primary) 0%, var(--neon-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }

        /* Header Section */
        header {
            text-align: center;
            padding: 160px 20px 80px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container & Grid for Delivery Proofs */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 60px;
            letter-spacing: 3px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            padding-bottom: 100px;
        }

        /* Robotic Edge Video Boxes */
        .video-card {
            background: var(--surface);
            border: 1px solid var(--border-tech);
            clip-path: polygon(30px 0, 100% 0, 100% calc(100% - 30px), calc(100% - 30px) 100%, 0 100%, 0 30px);
            padding: 25px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .video-card::before {
            content: '';
            position: absolute;
            top: 0; left: 30px;
            width: 40px; height: 2px;
            background: var(--neon-secondary);
            box-shadow: 0 0 10px var(--neon-secondary);
        }

        .video-card::after {
            content: '';
            position: absolute;
            bottom: 0; right: 30px;
            width: 40px; height: 2px;
            background: var(--neon-primary);
            box-shadow: 0 0 10px var(--neon-primary);
        }

        .video-card:hover {
            transform: translateY(-10px);
            background: rgba(25, 25, 35, 0.9);
            border-color: var(--neon-secondary);
        }

        /* Portrait Aspect Ratio Container for IG Reels */
        .ig-embed-container {
            width: 100%;
            aspect-ratio: 9 / 16; 
            background: #000;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .ig-embed-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: rgba(6, 182, 212, 0.5);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.8);
            animation: scanline 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .ig-embed-container iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            z-index: 2;
            position: relative;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            border-top: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .navbar { padding: 0 20px; }
            .video-grid { grid-template-columns: 1fr; }
            .nav-brand { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <!-- Footer -->
    <footer>

</body>
</html>
